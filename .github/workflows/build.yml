name: Build Plugin

on:
  push:
    branches:
      - '*'
#  pull_request:
#    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      CI: true
      CI_BUILD_VERSION: 1.4.0.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        id: setup-jdk-25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build 2026.2
        run: ./gradlew buildPlugin -DIDEA_VER=2026.2 -Porg.gradle.java.installations.paths="${{ steps.setup-jdk-25.outputs.path }}"

      - name: Build 2026.1
        run: ./gradlew buildPlugin -DIDEA_VER=2026.1

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: v${{ env.CI_BUILD_VERSION }}
          path: build/distributions/*.zip
